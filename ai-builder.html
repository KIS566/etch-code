<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Website Builder | Etch & Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg:#080605; --bg-card:#100D0B; --bg-input:#1A1512;
            --text:#FDFAF6; --text-secondary:#B8B0A8;
            --gold:#D4AF37; --gold-light:#C8A882;
            --border:rgba(253,250,246,0.08); --radius:16px; --radius-lg:24px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
            min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem;
        }
        .builder {
            width:100%; max-width:1100px; display:grid; grid-template-columns:1fr 1fr; gap:2rem;
        }
        @media(max-width:900px) { .builder { grid-template-columns:1fr; } }
        .chat-panel {
            background:var(--bg-card); border-radius:var(--radius-lg);
            border:1px solid var(--border); display:flex; flex-direction:column; height:600px; overflow:hidden;
        }
        .chat-header {
            padding:1.2rem 1.5rem; border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:0.8rem; background:rgba(212,175,55,0.05);
        }
        .bot-avatar {
            width:42px; height:42px; background:linear-gradient(135deg,var(--gold-light),var(--gold));
            border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-size:1.2rem; color:#0A1F1A;
        }
        .chat-messages {
            flex:1; overflow-y:auto; padding:1.5rem;
            display:flex; flex-direction:column; gap:1rem;
        }
        .msg {
            display:flex; gap:0.7rem; animation:slide 0.3s ease;
        }
        @keyframes slide { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .msg.user { flex-direction:row-reverse; }
        .msg-avatar {
            width:30px; height:30px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:0.65rem; font-weight:700; flex-shrink:0;
        }
        .msg.bot .msg-avatar { background:rgba(212,175,55,0.15); color:var(--gold); }
        .msg.user .msg-avatar { background:var(--gold); color:#0A1F1A; }
        .msg-bubble {
            max-width:75%; padding:0.75rem 1rem; border-radius:16px;
            font-size:0.85rem; line-height:1.6;
        }
        .msg.bot .msg-bubble { background:var(--bg-input); border-bottom-left-radius:4px; }
        .msg.user .msg-bubble { background:var(--gold); color:#0A1F1A; border-bottom-right-radius:4px; }
        .options-row { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.6rem; }
        .opt-btn {
            background:var(--bg); border:1px solid var(--border);
            padding:0.4rem 0.9rem; border-radius:25px; font-size:0.75rem;
            font-weight:500; cursor:pointer; color:var(--text-secondary);
            transition:all 0.2s; font-family:'Inter',sans-serif;
        }
        .opt-btn:hover { border-color:var(--gold); color:var(--gold); background:rgba(212,175,55,0.08); }
        .chat-footer {
            padding:1rem 1.5rem; border-top:1px solid var(--border);
            display:flex; gap:0.5rem; background:var(--bg-card);
        }
        .chat-footer input {
            flex:1; padding:0.7rem 1rem; border-radius:25px;
            border:1px solid var(--border); background:var(--bg-input);
            color:var(--text); font-family:'Inter',sans-serif; font-size:0.85rem;
            outline:none; transition:all 0.2s;
        }
        .chat-footer input:focus { border-color:var(--gold); }
        .chat-footer button {
            width:40px; height:40px; border-radius:50%;
            background:var(--gold); border:none; color:#0A1F1A;
            cursor:pointer; font-size:0.9rem; transition:all 0.2s;
        }
        .chat-footer button:hover { background:#E8C547; transform:scale(1.05); }
        .preview-panel {
            background:var(--bg-card); border-radius:var(--radius-lg);
            border:1px solid var(--border); padding:1.5rem; overflow-y:auto; height:600px;
        }
        .empty-state {
            display:flex; flex-direction:column; align-items:center;
            justify-content:center; height:100%; text-align:center;
            color:var(--text-secondary); opacity:0.5;
        }
        .empty-state i { font-size:3rem; margin-bottom:1rem; color:var(--gold); }
        .site-card {
            background:var(--bg-input); border-radius:var(--radius);
            overflow:hidden; border:1px solid var(--border); animation:fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        .site-hero {
            background:linear-gradient(135deg,#0A1F1A,#1A3C34,#0D1B2A);
            padding:2rem; text-align:center; position:relative;
        }
        .site-hero::after {
            content:''; position:absolute; bottom:0; left:0; right:0;
            height:3px; background:linear-gradient(90deg,var(--gold-light),var(--gold),var(--gold-light));
        }
        .site-name { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700; color:#FFF; }
        .site-tagline { font-size:0.85rem; color:rgba(255,255,255,0.7); font-style:italic; margin-top:0.3rem; }
        .site-body { padding:1.5rem; }
        .site-desc { color:var(--text-secondary); font-size:0.85rem; line-height:1.7; margin-bottom:1.5rem; }
        .svc-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:0.6rem; margin-bottom:1.5rem; }
        .svc-tag {
            background:rgba(212,175,55,0.08); border:1px solid rgba(212,175,55,0.2);
            border-radius:8px; padding:0.6rem; text-align:center;
            font-size:0.75rem; font-weight:500; color:var(--gold-light);
        }
        .ctc-box {
            background:rgba(212,175,55,0.05); border-radius:12px;
            padding:1rem; text-align:center; font-size:0.8rem;
            color:var(--text-secondary); border:1px solid rgba(212,175,55,0.1);
        }
        .back-link {
            display:block; text-align:center; margin-top:1rem;
            color:var(--text-secondary); font-size:0.8rem; text-decoration:none;
        }
        .back-link:hover { color:var(--gold); }
    </style>
</head>
<body>
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="builder">
            <div class="chat-panel">
                <div class="chat-header">
                    <div class="bot-avatar">🤖</div>
                    <div><strong>Meraki AI</strong><br><small style="color:var(--text-secondary);">Website Builder</small></div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="msg bot">
                        <div class="msg-avatar">AI</div>
                        <div class="msg-bubble">
                            👋 Hello! I'll build your <strong>professional website</strong> in 60 seconds.<br><br>
                            <strong>Q1 of 6:</strong> What's your <strong>business name</strong>?
                        </div>
                    </div>
                </div>
                <div class="chat-footer">
                    <input type="text" id="chatInput" placeholder="Type here..." onkeypress="if(event.key==='Enter')handleText()" autofocus>
                    <button onclick="handleText()"><i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
            <div class="preview-panel" id="previewPanel">
                <div class="empty-state"><i class="fas fa-eye"></i><p>Your website preview</p><small>Complete the chat →</small></div>
            </div>
        </div>
        <a href="index.html" class="back-link">← Back to Etch & Code</a>
    </div>

    <script>
        const chatMessages=document.getElementById('chatMessages'),chatInput=document.getElementById('chatInput'),previewPanel=document.getElementById('previewPanel');
        let step=1;
        let data={name:'',tagline:'',desc:'',services:'',contact:'',industry:''};

        function addMsg(text,isUser=false){
            const d=document.createElement('div'); d.className=`msg ${isUser?'user':'bot'}`;
            d.innerHTML=`<div class="msg-avatar">${isUser?'U':'AI'}</div><div class="msg-bubble">${text}</div>`;
            chatMessages.appendChild(d); chatMessages.scrollTop=chatMessages.scrollHeight;
        }

        function addOpts(opts){
            const last=chatMessages.lastElementChild; if(!last)return;
            const bubble=last.querySelector('.msg-bubble'); if(!bubble)return;
            const row=document.createElement('div'); row.className='options-row';
            opts.forEach(o=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=o;b.onclick=()=>{addMsg(o,true);process(o);};row.appendChild(b);});
            bubble.appendChild(row); chatMessages.scrollTop=chatMessages.scrollHeight;
        }

        function process(val){
            if(step===1){data.name=val;addMsg(`✨ <strong>${val}</strong> — great name!<br><br><strong>Q2:</strong> Write a <strong>tagline</strong>.<br><small style="opacity:0.7;">e.g., "Crafting digital excellence"</small>`);step=2;}
            else if(step===2){data.tagline=val;addMsg(`💫 Love it!<br><br><strong>Q3:</strong> Describe your <strong>business</strong> in 2-3 lines.`);step=3;}
            else if(step===3){data.desc=val;addMsg(`📝 Got it!<br><br><strong>Q4:</strong> List your <strong>services</strong> (comma separated).<br><small style="opacity:0.7;">e.g., Web Design, SEO, Branding</small>`);step=4;}
            else if(step===4){data.services=val;addMsg(`📞 <strong>Q5:</strong> Your <strong>contact number</strong>?<br><small style="opacity:0.7;">e.g., +91 98765 43210</small>`);step=5;}
            else if(step===5){data.contact=val;addMsg(`🏢 <strong>Q6:</strong> Select your <strong>industry</strong>:`);addOpts(['Technology','Creative','Business','Healthcare','Education','E-commerce','Real Estate','Food']);step=6;}
            else if(step===6){data.industry=val;addMsg(`🎉 <strong>Done!</strong> Your website is ready! Check the preview →<br><br>Want this live? <strong>Contact us!</strong>`);generate();step=7;}
        }

        function generate(){
            const{name,tagline,desc,services,contact,industry}=data;
            const svcList=services.split(',').map(s=>s.trim()).filter(Boolean);
            const defSvc=svcList.length?svcList:['Web Dev','UI/UX','Strategy'];
            const svcHtml=defSvc.map(s=>`<div class="svc-tag">${esc(s)}</div>`).join('');
            const cln=esc(name).toLowerCase().replace(/\s+/g,'');
            previewPanel.innerHTML=`
                <div class="site-card">
                    <div class="site-hero"><div class="site-name">${esc(name)}</div><div class="site-tagline">${esc(tagline||'Excellence delivered')}</div></div>
                    <div class="site-body">
                        <div class="site-desc">${esc(desc||`${esc(name)} is a premium ${esc(industry||'business')} delivering innovative solutions.`)}</div>
                        <div class="svc-grid">${svcHtml}</div>
                        <div class="ctc-box"><i class="fas fa-phone-alt" style="color:var(--gold);"></i> ${esc(contact||'+91 98765 43210')}<br><i class="fas fa-envelope" style="color:var(--gold);"></i> hello@${cln||'business'}.com</div>
                    </div>
                </div>`;
        }

        function esc(s){if(!s)return'';return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);}

        function handleText(){
            const v=chatInput.value.trim(); if(!v||step>=6)return;
            addMsg(v,true); process(v); chatInput.value='';
        }
    </script>
</body>
</html>
