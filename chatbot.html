<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EtchBot | Etch & Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --bg: #080605; --bg-card: #100D0B; --bg-input: #1A1512;
            --text: #FDFAF6; --text-secondary: #B8B0A8;
            --gold: #D4AF37; --gold-light: #C8A882;
            --border: rgba(253,250,246,0.08); --radius: 16px; --radius-lg: 24px;
            --logo: url('https://raw.githubusercontent.com/KIS566/etch-code/main/cropped_circle_image.png');
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
            min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem;
        }
        .chat-container {
            width:100%; max-width:500px; height:92vh; max-height:800px;
            background:var(--bg-card); border-radius:var(--radius-lg);
            border:1px solid var(--border); display:flex; flex-direction:column;
            overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,0.7);
        }
        .chat-header {
            padding:1.2rem 1.5rem; border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:0.8rem; background:rgba(212,175,55,0.05);
        }
        .bot-avatar {
            width:48px; height:48px; border-radius:50%; border:2px solid #D4AF37;
            object-fit:cover; position:relative; box-shadow:0 0 20px rgba(212,175,55,0.3);
        }
        .bot-avatar-wrapper { position:relative; }
        .status-dot {
            position:absolute; bottom:0px; right:0px;
            width:14px; height:14px; background:#4ADE80; border-radius:50%;
            border:2px solid #100D0B; animation:pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,0.6);} 50%{box-shadow:0 0 0 10px rgba(74,222,128,0);} }
        .chat-messages { flex:1; overflow-y:auto; padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }
        .msg { display:flex; gap:0.7rem; animation:slideIn 0.4s ease; }
        @keyframes slideIn { from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);} }
        .msg.user { flex-direction:row-reverse; }
        .msg-avatar {
            width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-size:0.65rem; font-weight:700; flex-shrink:0; object-fit:cover;
        }
        .msg.bot .msg-avatar { border:2px solid #D4AF37; }
        .msg.user .msg-avatar { background:var(--gold); color:#0A1F1A; border:2px solid var(--gold); }
        .msg-bubble { max-width:78%; padding:0.75rem 1rem; border-radius:16px; font-size:0.85rem; line-height:1.6; }
        .msg.bot .msg-bubble { background:var(--bg-input); border-bottom-left-radius:4px; }
        .msg.user .msg-bubble { background:var(--gold); color:#0A1F1A; border-bottom-right-radius:4px; font-weight:500; }
        .options-row { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.7rem; }
        .opt-btn { background:var(--bg); border:1px solid var(--border); padding:0.5rem 1rem; border-radius:25px; font-size:0.78rem; font-weight:500; cursor:pointer; color:var(--text-secondary); transition:all 0.2s; font-family:'Inter',sans-serif; }
        .opt-btn:hover { border-color:var(--gold); color:var(--gold); background:rgba(212,175,55,0.08); transform:translateY(-2px); }
        .opt-btn.primary { background:var(--gold); color:#0A1F1A; border-color:var(--gold); font-weight:700; animation:btnGlow 2s infinite; }
        @keyframes btnGlow { 0%,100%{box-shadow:0 0 10px rgba(212,175,55,0.3);} 50%{box-shadow:0 0 25px rgba(212,175,55,0.6);} }
        .opt-btn.primary:hover { background:#E8C547; animation:none; }
        .chat-footer { padding:1rem 1.5rem; border-top:1px solid var(--border); display:flex; gap:0.5rem; background:var(--bg-card); }
        .chat-footer input { flex:1; padding:0.75rem 1rem; border-radius:25px; border:1px solid var(--border); background:var(--bg-input); color:var(--text); font-family:'Inter',sans-serif; font-size:0.85rem; outline:none; transition:all 0.2s; }
        .chat-footer input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(212,175,55,0.1); }
        .chat-footer button { width:44px; height:44px; border-radius:50%; background:var(--gold); border:none; color:#0A1F1A; cursor:pointer; font-size:0.9rem; transition:all 0.2s; }
        .chat-footer button:hover { background:#E8C547; transform:scale(1.08); }
        .back-link { display:block; text-align:center; margin-top:1rem; color:var(--text-secondary); font-size:0.8rem; text-decoration:none; transition:color 0.2s; }
        .back-link:hover { color:var(--gold); }
        .typing-dots { display:flex; gap:4px; padding:0.5rem 0; }
        .typing-dots span { width:7px; height:7px; border-radius:50%; background:var(--gold); animation:typing 1.4s infinite; }
        .typing-dots span:nth-child(2) { animation-delay:0.2s; }
        .typing-dots span:nth-child(3) { animation-delay:0.4s; }
        @keyframes typing { 0%,60%,100%{opacity:0.3; transform:translateY(0);} 30%{opacity:1; transform:translateY(-5px);} }
        .lead-badge { display:inline-block; background:#4ADE80; color:#0A1F1A; padding:0.2rem 0.7rem; border-radius:12px; font-size:0.7rem; font-weight:700; animation:fadeIn 0.5s ease; }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    </style>
</head>
<body>
    <div style="display:flex;flex-direction:column;align-items:center;">
        <div class="chat-container">
            <div class="chat-header">
                <div class="bot-avatar-wrapper">
                    <img src="https://raw.githubusercontent.com/KIS566/etch-code/main/cropped_circle_image.png" alt="Etch & Code" class="bot-avatar">
                    <span class="status-dot"></span>
                </div>
                <div>
                    <div><strong>EtchBot</strong> <span style="font-size:0.65rem;color:var(--gold);">by Etch & Code</span></div>
                    <div style="font-size:0.7rem;color:#4ADE80;">Online · Ready to help</div>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="msg bot">
                    <img src="https://raw.githubusercontent.com/KIS566/etch-code/main/cropped_circle_image.png" alt="EC" class="msg-avatar">
                    <div class="msg-bubble">
                        👋 <strong>Hey there!</strong> I'm EtchBot from <strong>Etch & Code</strong> — a premium web design agency.<br><br>
                        I'd love to understand your needs and create something amazing for you.<br><br>
                        <strong>What brings you here today?</strong>
                        <div class="options-row">
                            <button class="opt-btn" onclick="sendOption('Need a new website')">🆕 New Website</button>
                            <button class="opt-btn" onclick="sendOption('Redesign existing site')">🎨 Redesign</button>
                            <button class="opt-btn" onclick="sendOption('E-commerce store')">🛒 E-Commerce</button>
                            <button class="opt-btn" onclick="sendOption('Just exploring')">👀 Exploring</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="chat-footer">
                <input type="text" id="chatInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter')handleText()">
                <button onclick="handleText()"><i class="fas fa-arrow-right"></i></button>
            </div>
        </div>
        <a href="index.html" class="back-link">← Back to Etch & Code</a>
    </div>

    <script>
        (function(){ emailjs.init("aRJNUe_KN0bQ-pSI5"); })();

        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const LOGO_URL = 'https://raw.githubusercontent.com/KIS566/etch-code/main/cropped_circle_image.png';
        let step = 0;
        let userData = { name:'', email:'', need:'', budget:'', timeline:'', phone:'' };

        function addMessage(text, isUser=false) {
            const div = document.createElement('div');
            div.className = `msg ${isUser?'user':'bot'}`;
            if(isUser) {
                div.innerHTML = `<div class="msg-avatar">You</div><div class="msg-bubble">${text}</div>`;
            } else {
                div.innerHTML = `<img src="${LOGO_URL}" alt="EC" class="msg-avatar"><div class="msg-bubble">${text}</div>`;
            }
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addOptions(options) {
            const lastMsg = chatMessages.lastElementChild;
            if(!lastMsg) return;
            const bubble = lastMsg.querySelector('.msg-bubble');
            if(!bubble) return;
            const row = document.createElement('div');
            row.className = 'options-row';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = opt.primary ? 'opt-btn primary' : 'opt-btn';
                btn.textContent = opt.label;
                btn.onclick = () => { sendOption(opt.label); };
                row.appendChild(btn);
            });
            bubble.appendChild(row);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping(callback, delay=1000) {
            const div = document.createElement('div');
            div.className = 'msg bot';
            div.innerHTML = `<img src="${LOGO_URL}" alt="EC" class="msg-avatar"><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            setTimeout(() => { div.remove(); callback(); }, delay);
        }

        async function sendEmails() {
            const now = new Date().toLocaleString();
            const fd = new FormData();
            fd.append('name', userData.name);
            fd.append('email', userData.email);
            fd.append('need', userData.need);
            fd.append('budget', userData.budget);
            fd.append('timeline', userData.timeline);
            fd.append('phone', userData.phone);
            fd.append('source', 'EtchBot');
            fd.append('date', now);
            try { await fetch('https://formspree.io/f/xvzvddrl', {method:'POST', body:fd, headers:{'Accept':'application/json'}}); } catch(e){}

            try {
                await emailjs.send("service_xx2xpnh", "template_yxdysfe", {
                    name: userData.name, email: userData.email, need: userData.need,
                    budget: userData.budget, timeline: userData.timeline,
                    phone: userData.phone, date: now, source: 'EtchBot', time: now
                });
            } catch(e){}

            try {
                await emailjs.send("service_xx2xpnh", "template_pbxx3wa", {
                    to_name: userData.name, to_email: userData.email,
                    need: userData.need, budget: userData.budget, timeline: userData.timeline
                });
                return true;
            } catch(e){ return false; }
        }

        function sendOption(value) { addMessage(value, true); processResponse(value); }

        function handleText() {
            const val = chatInput.value.trim(); if(!val) return;
            addMessage(val, true); processResponse(val); chatInput.value = '';
        }

        function processResponse(value) {
            if(step === 0) {
                userData.need = value;
                showTyping(() => { addMessage(`Got it! <strong>${value}</strong> — excellent choice. ✨<br><br>To give you the best experience, can you share your <strong>name</strong>?`); });
                step = 1;
            } else if(step === 1) {
                userData.name = value;
                showTyping(() => { addMessage(`Nice to meet you, <strong>${value}</strong>! 😊<br><br>What's your <strong>email address</strong>? I'll send you some portfolio examples and a special offer.`); });
                step = 2;
            } else if(step === 2) {
                userData.email = value;
                showTyping(() => { addMessage(`Perfect! 📧<br><br>Quick one — what's your approximate <strong>budget range</strong> for this project?`); 
                    addOptions([{label:'₹25K - ₹50K'},{label:'₹50K - ₹1L'},{label:'₹1L - ₹3L'},{label:'₹3L+'},{label:'Not sure yet'}]); });
                step = 3;
            } else if(step === 3) {
                userData.budget = value;
                showTyping(() => { addMessage(`Thanks! ⏱️ And your preferred <strong>timeline</strong>? When do you need this ready?`); 
                    addOptions([{label:'ASAP (1-2 weeks)'},{label:'Within 1 month'},{label:'2-3 months'},{label:'No rush, just exploring'}]); });
                step = 4;
            } else if(step === 4) {
                userData.timeline = value;
                showTyping(() => { addMessage(`Last thing — your <strong>phone/WhatsApp number</strong>? So we can send you a quick voice note with our proposal.`); });
                step = 5;
            } else if(step === 5) {
                userData.phone = value;
                showTyping(async () => {
                    addMessage(`📤 <strong>Creating your personalized proposal...</strong>`);
                    const sent = await sendEmails();
                    if(sent) { 
                        addMessage(`✅ <strong>Done!</strong> I've sent a confirmation to <strong>${userData.email}</strong>. <span class="lead-badge">Lead Sent</span>`); 
                    }
                    addMessage(`🎉 <strong>You're all set, ${userData.name}!</strong><br><br>📌 <strong>Need:</strong> ${userData.need}<br>💰 <strong>Budget:</strong> ${userData.budget}<br>⏱️ <strong>Timeline:</strong> ${userData.timeline}<br>📱 <strong>Phone:</strong> ${userData.phone}<br><br>📧 Our team will contact you <strong>within 12-24 hours</strong> with a custom proposal.<br><br>📞 <strong>Urgent?</strong> Call/WhatsApp directly: <strong>+91 9355121175</strong>`);
                    setTimeout(() => {
                        addMessage(`While you wait, here's what you can do:`);
                        addOptions([
                            {label:'📂 View Our Portfolio'},
                            {label:'💬 WhatsApp Chat', primary:true},
                            {label:'🚀 Try Our AI Builder'},
                            {label:'📧 Email Us'}
                        ]);
                        const last = chatMessages.lastElementChild;
                        if(last) {
                            const btns = last.querySelectorAll('.opt-btn');
                            if(btns[0]) btns[0].onclick = () => window.open('https://kis566.github.io/KMFL-K/#home', '_blank');
                            if(btns[1]) btns[1].onclick = () => window.open('https://wa.me/919355121175?text=Hi%20Etch%20%26%20Code!%20I%20just%20chatted%20with%20EtchBot%20and%20want%20to%20know%20more.', '_blank');
                            if(btns[2]) btns[2].onclick = () => window.location.href = 'ai-builder.html';
                            if(btns[3]) btns[3].onclick = () => window.location.href = 'mailto:k9891p@gmail.com';
                        }
                    }, 2500);
                }, 1500);
                step = 6;
            }
        }
        chatInput.focus();
    </script>
</body>
</html>
